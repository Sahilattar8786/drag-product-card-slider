<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product-card-slider — React Demo (CDN)</title>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for in-browser JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ProductCardSlider UMD from unpkg (exposes window.ProductCardSlider) -->
  <script src="https://unpkg.com/product-card-slider/dist/product-card-slider.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7; color: #1d1d1f; padding: 2rem 1rem;
    }

    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.25rem; }
    .header .sub { color: #86868b; font-size: 0.95rem; margin-bottom: 0.75rem; }
    .header .badges { display: flex; justify-content: center; gap: 0.4rem; flex-wrap: wrap; }
    .header .badges span {
      background: #e8e8ed; padding: 0.2rem 0.65rem; border-radius: 5px;
      font-size: 0.75rem; color: #555; font-weight: 500;
    }
    .header .badges .react { background: #e0f4ff; color: #0a7ea4; }

    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem; max-width: 1100px; margin: 0 auto 2rem;
    }

    .product-card {
      background: #fff; border-radius: 12px; overflow: hidden; position: relative;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.2s;
    }
    .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .product-slider { aspect-ratio: 1/1; background: #eee; }
    .product-slider img { width: 100%; height: 100%; object-fit: cover; }

    .product-info { padding: 0.75rem 1rem 1rem; }
    .product-info h3 {
      font-size: 0.95rem; font-weight: 500; margin-bottom: 0.25rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-info .meta { display: flex; justify-content: space-between; align-items: center; }
    .product-info .price { font-size: 0.95rem; font-weight: 600; }
    .product-info .cat {
      font-size: 0.75rem; color: #86868b; background: #f0f0f5;
      padding: 2px 8px; border-radius: 4px;
    }

    .section-title { max-width: 1100px; margin: 0 auto 0.5rem; font-size: 1.1rem; font-weight: 600; }
    .section-desc { max-width: 1100px; margin: 0 auto 1rem; font-size: 0.85rem; color: #86868b; }
    hr { max-width: 1100px; margin: 1.5rem auto 2rem; border: none; border-top: 1px solid #e5e5e5; }

    .loader { text-align: center; padding: 4rem 1rem; color: #86868b; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #0a7ea4;
      border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mode-tabs {
      max-width: 1100px; margin: 0 auto 1.5rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .mode-tabs button {
      padding: 0.4rem 1rem; border: 1.5px solid #ddd; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 500;
      color: #555; transition: all 0.15s;
    }
    .mode-tabs button:hover { border-color: #999; }
    .mode-tabs button.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

    .hook-section { max-width: 320px; margin: 0 auto 3rem; }
    .hook-controls {
      display: flex; gap: 0.5rem; justify-content: center; align-items: center; margin-top: 1rem;
    }
    .hook-controls button {
      padding: 0.4rem 1rem; border: 1.5px solid #ddd; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 500;
    }
    .hook-jumps { display: flex; gap: 0.35rem; justify-content: center; margin-top: 0.75rem; }
    .hook-jumps button {
      width: 28px; height: 28px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 0.75rem; font-weight: 600;
    }

    .footer {
      text-align: center; padding: 2rem 1rem; color: #86868b; font-size: 0.8rem;
    }
    .footer a { color: #0071e3; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const DATA_URL = 'products.json';

    /* ---- useProductSlider hook ---- */
    function useProductSlider(options, deps = []) {
      const ref = useRef(null);
      const inst = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el || !el.querySelectorAll('img').length) return;
        inst.current?.destroy();
        inst.current = new ProductCardSlider(el, options);
        return () => { inst.current?.destroy(); inst.current = null; };
      }, deps);
      return {
        ref,
        next: () => inst.current?.next(),
        prev: () => inst.current?.prev(),
        goTo: (i) => inst.current?.goTo(i),
      };
    }

    /* ---- ProductSlider component ---- */
    function ProductSlider({ images, options = {}, onSlideChange }) {
      const cRef = useRef(null);
      const iRef = useRef(null);
      useEffect(() => {
        const el = cRef.current;
        if (!el || !images.length) return;
        iRef.current = new ProductCardSlider(el, options);
        const h = (e) => onSlideChange?.(e.detail.index);
        el.addEventListener('pcs:change', h);
        return () => { el.removeEventListener('pcs:change', h); iRef.current?.destroy(); iRef.current = null; };
      }, [images]);

      return (
        <div ref={cRef} className="product-slider">
          {images.map((src, i) => (
            <img key={src+i} src={i===0?src:undefined} data-src={i>0?src:undefined} alt="" />
          ))}
        </div>
      );
    }

    /* ---- ProductCard ---- */
    function ProductCard({ product, options, onSlideChange }) {
      return (
        <div className="product-card">
          <ProductSlider images={product.images} options={options} onSlideChange={onSlideChange} />
          <div className="product-info">
            <h3>{product.title}</h3>
            <div className="meta">
              <span className="price">${product.price}</span>
              <span className="cat">{product.category}</span>
            </div>
          </div>
        </div>
      );
    }

    /* ---- Mode definitions ---- */
    const MODES = [
      { id:'default', label:'Default (Drag + Arrows)', desc:'Swipe, drag, or click arrows. Dots show position.',
        opts:{ showDots:true, showArrows:true } },
      { id:'hover', label:'Hover Preview', desc:'Move mouse horizontally to preview images. Shopify-style.',
        opts:{ hoverPreview:true, showDots:true, showArrows:false } },
      { id:'autoplay', label:'Autoplay + Loop', desc:'Images auto-advance on hover. Infinite loop.',
        opts:{ autoplay:true, loop:true, interval:2000, showDots:true, showArrows:true } },
      { id:'minimal', label:'Minimal', desc:'No dots, no arrows. Pure drag/swipe only.',
        opts:{ showDots:false, showArrows:false } },
    ];

    /* ---- HookDemo ---- */
    function HookDemo({ product }) {
      const imgs = product.images;
      const [cur, setCur] = useState(0);
      const { ref, next, prev, goTo } = useProductSlider(
        { showDots:true, showArrows:false, loop:true }, [product.id]
      );
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const h = (e) => setCur(e.detail.index);
        el.addEventListener('pcs:change', h);
        return () => el.removeEventListener('pcs:change', h);
      }, [product.id]);

      return (
        <div className="hook-section">
          <div className="product-card">
            <div className="product-slider" ref={ref}>
              {imgs.map((s,i) => <img key={s+i} src={i===0?s:undefined} data-src={i>0?s:undefined} alt="" />)}
            </div>
            <div className="product-info">
              <h3>{product.title}</h3>
              <div className="meta">
                <span className="price">${product.price}</span>
                <span className="cat">{product.category}</span>
              </div>
            </div>
          </div>
          <div className="hook-controls">
            <button onClick={prev}>&larr; Prev</button>
            <span style={{fontSize:'0.85rem',color:'#86868b',minWidth:60,textAlign:'center'}}>{cur+1} / {imgs.length}</span>
            <button onClick={next}>Next &rarr;</button>
          </div>
          <div className="hook-jumps">
            {imgs.map((_,i) => (
              <button key={i} onClick={() => goTo(i)}
                style={{ background: i===cur?'#1d1d1f':'#e5e5e5', color: i===cur?'#fff':'#555' }}>
                {i+1}
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ---- App ---- */
    function App() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [mode, setMode] = useState('default');

      useEffect(() => {
        fetch(DATA_URL).then(r => r.json()).then(data => {
          setProducts(data);
          setLoading(false);
        }).catch(e => { setError(e.message); setLoading(false); });
      }, []);

      const m = MODES.find(x => x.id === mode);

      return (
        <React.Fragment>
          <div className="header">
            <h1>product-card-slider</h1>
            <p className="sub">React CDN Demo — no build tools required</p>
            <div className="badges">
              <span className="react">React 18</span>
              <span>Babel Standalone</span>
              <span>UMD via unpkg</span>
              <span className="react">Local JSON Data</span>
            </div>
          </div>

          <h2 className="section-title">Slider Mode</h2>
          <div className="mode-tabs">
            {MODES.map(x => (
              <button key={x.id} className={x.id===mode?'active':''} onClick={() => setMode(x.id)}>{x.label}</button>
            ))}
          </div>
          <p className="section-desc">{m.desc}</p>

          {loading && <div className="loader"><div className="spinner"></div>Fetching products&hellip;</div>}
          {error && <p style={{color:'#c00',textAlign:'center',padding:'2rem'}}>Failed: {error}</p>}

          {!loading && !error && (
            <React.Fragment>
              <div className="product-grid" key={mode}>
                {products.slice(0,8).map(p => <ProductCard key={p.id} product={p} options={m.opts} />)}
              </div>

              <hr />
              <h2 className="section-title">useProductSlider Hook</h2>
              <p className="section-desc">Imperative control — external Prev / Next buttons and jump-to-slide via React hook.</p>
              <HookDemo product={products[0]} />
            </React.Fragment>
          )}

          <div className="footer">
            <a href="https://github.com/Sahilattar8786/drag-product-card-slider" target="_blank">GitHub</a> &middot;
            <a href="https://www.npmjs.com/package/product-card-slider" target="_blank">npm</a> &middot;
            Product data from <code>examples/products.json</code>
          </div>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
